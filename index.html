<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evee's Adventure</title>
    <meta name="description" content="A Game Boy-styled, choose-your-own-adventure text game starring a lost Evee finding its way home.">
    <meta name="theme-color" content="#cc0000">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Evee's Adventure">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-boy">
        <div id="game-header">
            <span class="pokeball" aria-hidden="true"></span>
            <h1 id="game-title">Evee's Adventure</h1>
            <span class="pokeball" aria-hidden="true"></span>
        </div>
        <div id="game-container">
            <div id="start-screen">
                <p id="start-text">A young Evee has wandered far from home. Can you help find the way back to family?</p>
                <button id="start-button" class="choice-button">Press Start</button>
            </div>
            <div id="story-text" hidden></div>
            <div id="choice-container" hidden></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch((err) => {
                    console.error('Service worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
